services:
  goloop:
    build: .
    image: ghcr.io/cookieboty/goloop:latest
    pull_policy: always
    ports:
      - "8080:8080"
    volumes:
      - goloop-images:/tmp/images
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  goloop-images:
    driver: local
